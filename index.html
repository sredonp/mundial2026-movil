<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fase Final Mundial 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: #888;
    }

    .status-bar {
      text-align: center;
      margin-bottom: 15px;
      font-size: 0.8rem;
      color: #666;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .dot.ok { background: #4caf50; }
    .dot.loading { background: #ff9800; animation: pulse 1.5s infinite; }
    .dot.err { background: #f44336; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .bracket-wrapper {
      position: relative;
      margin: 20px auto;
      max-width: 100%;
      overflow-x: auto;
    }

    .bracket-container {
      position: relative;
      display: inline-block;
      min-width: 100%;
      padding: 40px;
    }

    /* ===== ÁRBOL VERTICAL (arriba/abajo, como la llave de referencia) ===== */
    .bracket-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .connector-v {
      width: 0;
      height: 30px;
      border-left: 2px solid #ffd700;
      margin: 0 auto;
    }

    /* Mitad superior: las hojas quedan arriba y convergen HACIA ABAJO hasta la
       semifinal (justo encima de la FINAL). Se construye el árbol normal
       (raíz arriba) y se invierte verticalmente con scaleY(-1); el contenido
       de cada tarjeta se vuelve a invertir para que se lea correctamente. */
    .tree-wrap.flip {
      transform: scaleY(-1);
    }
    .tree-wrap.flip .mini-card {
      transform: scaleY(-1);
    }

    .tree-wrap {
      display: inline-block;
    }

    .tree, .tree ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: inline-block;
    }

    .tree ul {
      position: relative;
      padding-top: 30px;
    }
    .tree ul::after {
      content: "";
      display: table;
      clear: both;
    }

    .tree li {
      float: left;
      text-align: center;
      list-style-type: none;
      position: relative;
      padding: 30px 8px 0 8px;
    }

    .tree li::before,
    .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      width: 50%;
      height: 30px;
      border-top: 2px solid #4a9eff;
    }
    .tree li::after {
      right: auto;
      left: 50%;
      border-left: 2px solid #4a9eff;
    }
    .tree li:only-child::after,
    .tree li:only-child::before {
      display: none;
    }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before,
    .tree li:last-child::after {
      border: 0 none;
    }
    .tree li:last-child::before {
      border-right: 2px solid #4a9eff;
    }
    .tree > li {
      padding-top: 0;
    }
    .tree > li::before,
    .tree > li::after {
      display: none;
    }
    .tree li ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 0;
      height: 30px;
      border-left: 2px solid #4a9eff;
    }

    /* ===== CASILLAS ===== */
    .mini-card {
      margin: 0 auto;
      background: linear-gradient(135deg, #1a2555 0%, #2d3e5f 100%);
      border: 2px solid #4a9eff;
      border-radius: 8px;
      width: 105px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.2);
    }

    .mini-card:hover {
      border-color: #ffd700;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
      transform: scale(1.08);
    }

    .mini-card.done {
      border-color: #4caf50;
    }

    .mini-card-header {
      background: #0f1729;
      padding: 2px 3px;
      text-align: center;
      font-size: 0.6rem;
      color: #888;
      border-bottom: 1px solid rgba(74, 158, 255, 0.3);
    }

    .mini-card-content {
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .mini-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 4px;
      min-height: 48px;
      border-bottom: 1px solid rgba(74, 158, 255, 0.2);
      position: relative;
      flex: 1;
      gap: 2px;
    }

    .mini-row:last-child {
      border-bottom: none;
    }

    .mini-row:hover {
      background: rgba(255, 215, 0, 0.05);
    }

    .mini-abbr {
      font-size: 0.7rem;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 0.3px;
    }

    .mini-abbr.pending {
      color: #888;
    }

    .mini-flag {
      width: 28px;
      height: 21px;
      border-radius: 2px;
      object-fit: cover;
      background: #333;
    }

    .mini-flag-ph {
      width: 28px;
      height: 21px;
      background: #444;
      border-radius: 2px;
    }

    .mini-score-wrap {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
    }

    .mini-score {
      font-size: 0.9rem;
      font-weight: bold;
      color: #4caf50;
    }

    .mini-score.live {
      color: #4caf50;
      font-size: 1rem;
    }

    .mini-score:not(.live) {
      color: #888;
    }

    .penalty-text {
      font-size: 0.55rem;
      color: #ff9800;
    }

    .mini-penalty {
      font-size: 0.6rem;
      font-weight: normal;
      color: #ff9800;
    }

    .mini-card-footer {
      background: #0f1729;
      padding: 4px 3px;
      border-top: 3px solid #ff4444;
      font-size: 0.55rem;
      color: #888;
      text-align: center;
      line-height: 1.2;
    }

    .mini-card.final {
      border: 3px solid #ffd700;
      width: 120px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }

    .trophy {
      font-size: 3rem;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .final-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: #ffd700;
      text-transform: uppercase;
    }

    .center-final {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .final-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .final-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .third-place {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 22px;
    }

    .third-title {
      font-size: 0.7rem;
      color: #aaa;
      font-weight: bold;
    }

    .error-msg {
      background: #c82333;
      border: 2px solid #f44336;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #fff;
      margin: 20px;
    }

    @media (max-width: 1024px) {
      .bracket-container {
        padding: 20px;
      }

      .tree li {
        padding: 24px 5px 0 5px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚽ MUNDIAL 2026</h1>
  <div class="subtitle">Fase Final · Datos en tiempo real · Colombia (UTC-5)</div>
</div>

<div class="status-bar">
  <span class="dot ok" id="dot"></span>
  <span id="st">Cargando...</span> · <span id="upd">--:--</span>
</div>

<div class="bracket-wrapper">
  <div class="bracket-container">
    <div class="bracket-content" id="bracket"></div>
  </div>
</div>

<script>
const PROXY = "https://script.google.com/macros/s/AKfycby9V6YTOZcWTUD9NtmlFhgJTuIjkdREBGEfyrjSy8FLRvWrARBJn68JKTjVfzmLClkIEA/exec";

const FLAGS = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Korea Republic':'kr','Czech Republic':'cz','Czechia':'cz',
  'Switzerland':'ch','Canada':'ca','Bosnia and Herzegovina':'ba','Bosnia':'ba','Qatar':'qa',
  'Brazil':'br','Morocco':'ma','Scotland':'gb-sct','Haiti':'ht',
  'United States':'us','USA':'us','Australia':'au','Paraguay':'py',
  'Turkey':'tr','Türkiye':'tr',
  'Germany':'de','Ivory Coast':'ci',"Côte d'Ivoire":'ci','Ecuador':'ec',
  'Curaçao':'cw','Curacao':'cw',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Uruguay':'uy','Saudi Arabia':'sa',
  'France':'fr','Norway':'no','Senegal':'sn','Iraq':'iq',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Democratic Republic of the Congo':'cd',
  'Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa',
};

const TEAM_ES = {
  'Mexico':'México','South Africa':'Sudáfrica','South Korea':'Corea del Sur','Korea Republic':'Corea del Sur','Czech Republic':'Chequia','Czechia':'Chequia',
  'Switzerland':'Suiza','Canada':'Canadá','Bosnia and Herzegovina':'Bosnia','Bosnia':'Bosnia','Qatar':'Qatar',
  'Brazil':'Brasil','Morocco':'Marruecos','Scotland':'Escocia','Haiti':'Haití',
  'United States':'EE. UU.','USA':'EE. UU.','Australia':'Australia','Paraguay':'Paraguay',
  'Turkey':'Turquía','Türkiye':'Turquía',
  'Germany':'Alemania','Ivory Coast':'Costa de Marfil',"Côte d'Ivoire":'Costa de Marfil','Ecuador':'Ecuador',
  'Curaçao':'Curazao','Curacao':'Curazao',
  'Netherlands':'Holanda','Japan':'Japón','Sweden':'Suecia','Tunisia':'Túnez',
  'Belgium':'Bélgica','Egypt':'Egipto','Iran':'Irán','New Zealand':'Nueva Zelanda',
  'Spain':'España','Cape Verde':'Cabo Verde','Uruguay':'Uruguay','Saudi Arabia':'Arabia Saudita',
  'France':'Francia','Norway':'Noruega','Senegal':'Senegal','Iraq':'Irak',
  'Argentina':'Argentina','Algeria':'Argelia','Austria':'Austria','Jordan':'Jordania',
  'Portugal':'Portugal','DR Congo':'RD Congo','Democratic Republic of the Congo':'RD Congo',
  'Uzbekistan':'Uzbekistán','Colombia':'Colombia',
  'England':'Inglaterra','Croatia':'Croacia','Ghana':'Ghana','Panama':'Panamá',
};

const ABBR_ES = {
  'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Korea Republic':'KOR','Czech Republic':'CZE','Czechia':'CZE',
  'Switzerland':'SUI','Canada':'CAN','Bosnia and Herzegovina':'BIH','Bosnia':'BIH','Qatar':'QAT',
  'Brazil':'BRA','Morocco':'MAR','Scotland':'SCO','Haiti':'HAI',
  'United States':'USA','USA':'USA','Australia':'AUS','Paraguay':'PAR',
  'Turkey':'TUR','Türkiye':'TUR',
  'Germany':'GER','Ivory Coast':'CIV',"Côte d'Ivoire":'CIV','Ecuador':'ECU',
  'Curaçao':'CUW','Curacao':'CUW',
  'Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN',
  'Belgium':'BEL','Egypt':'EGY','Iran':'IRN','New Zealand':'NZL',
  'Spain':'ESP','Cape Verde':'CPV','Uruguay':'URU','Saudi Arabia':'KSA',
  'France':'FRA','Norway':'NOR','Senegal':'SEN','Iraq':'IRQ',
  'Argentina':'ARG','Algeria':'ALG','Austria':'AUT','Jordan':'JOR',
  'Portugal':'POR','DR Congo':'COD','Democratic Republic of the Congo':'COD',
  'Uzbekistan':'UZB','Colombia':'COL',
  'England':'ENG','Croatia':'CRO','Ghana':'GHA','Panama':'PAN',
};

const STAD = {
  1:'AT&T (Dallas)',2:"Levi's (SF)",3:'Rose Bowl (LA)',4:'SoFi (LA)',
  5:'Hard Rock (Miami)',6:'MetLife (NY/NJ)',7:'Arrowhead (KC)',
  8:'Lincoln Financial (Philly)',9:'Lumen Field (Seattle)',
  10:'Gillette (Boston)',11:'Empower (Denver)',12:'Azteca (CDMX)',
  13:'BC Place (Vancouver)',14:'Mercedes-Benz (Atlanta)',
  15:'NRG (Houston)',16:'Q2 (Austin)',
};

const pad = n => String(n).padStart(2,'0');

function fmtDate(s) {
  if (!s) return '';
  const [dp, tp] = s.split(' ');
  const [mo,dd,yy] = dp.split('/');
  const d = new Date(`${yy}-${mo}-${dd}T${tp}:00-05:00`);
  return `${d.getDate()} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]} ${pad(d.getHours())}:${pad(d.getMinutes())}h`;
}

function getAbbr(name) {
  if (isPending(name)) {
    let m = name?.match(/^Gan\. #(\d+)$/);
    if (m) return `G${m[1]}`;
    m = name?.match(/^Per\. #(\d+)$/);
    if (m) return `P${m[1]}`;
    m = name?.match(/^1\.° Grupo ([A-L])$/);
    if (m) return `1°${m[1]}`;
    m = name?.match(/^2\.° Grupo ([A-L])$/);
    if (m) return `2°${m[1]}`;
    if (name?.startsWith('Mejor')) return '3°';
    return '?';
  }
  return ABBR_ES[name] || (name ? name.slice(0,3).toUpperCase() : '?');
}

function isPending(name) {
  return !name || name.startsWith('Gan.') || name.startsWith('Per.') || name.startsWith('1.°') || name.startsWith('2.°') || name.startsWith('Mejor');
}

function resolveLabel(g, side, byId, visited) {
  visited = visited || new Set();
  const id = side === 'h' ? g.home_team_id : g.away_team_id;
  const nm = side === 'h' ? g.home_team_name_en : g.away_team_name_en;
  const lbl = side === 'h' ? g.home_team_label : g.away_team_label;

  if (id && id !== '0' && nm) return nm;
  if (!lbl) return '–';
  
  let m;
  m = lbl.match(/^Winner Group ([A-L])$/);
  if (m) return `1.° Grupo ${m[1]}`;
  m = lbl.match(/^Runner-up Group ([A-L])$/);
  if (m) return `2.° Grupo ${m[1]}`;
  m = lbl.match(/^3rd Group ([A-L/]+)$/);
  if (m) return `Mejor 3.° (${m[1]})`;
  m = lbl.match(/^Winner Match (\d+)$/);
  if (m) return resolveAdvancingTeam(m[1], true, byId, visited) || `Gan. #${m[1]}`;
  m = lbl.match(/^Loser Match (\d+)$/);
  if (m) return resolveAdvancingTeam(m[1], false, byId, visited) || `Per. #${m[1]}`;
  return lbl;
}

function resolveAdvancingTeam(matchId, wantWinner, byId, visited) {
  if (!byId || visited.has(matchId)) return null;
  visited.add(matchId);
  const g = byId[String(matchId)];
  if (!g || g.finished !== 'TRUE') return null;
  const hs = parseFloat(g.home_score);
  const as = parseFloat(g.away_score);
  if (isNaN(hs) || isNaN(as) || hs === as) return null;
  const homeAdvances = wantWinner ? hs > as : hs < as;
  return resolveLabel(g, homeAdvances ? 'h' : 'a', byId, visited);
}

function miniRow(name, score, penalty, done) {
  const pend = isPending(name);
  const abbr = getAbbr(name);
  const flagCode = FLAGS[name];
  const displayFull = pend ? name : (TEAM_ES[name] || name);
  const flagHtml = (!pend && flagCode)
    ? `<img src="https://flagcdn.com/32x24/${flagCode}.png" alt="${displayFull}" class="mini-flag" onerror="this.outerHTML='<span class=\\'mini-flag-ph\\'></span>'">`
    : `<span class="mini-flag-ph"></span>`;
  
  const live = done && score !== null && score !== undefined && score !== 'null';
  const scoreTxt = live ? score : '–';
  const penaltyTxt = penalty !== null && penalty !== undefined && penalty !== '' && penalty !== 'null' && live
    ? `<span class="mini-penalty">(${penalty})</span>`
    : '';

  return `<div class="mini-row" title="${displayFull}">
    <span class="mini-abbr ${pend?'pending':''}">${abbr}</span>
    ${flagHtml}
    <span class="mini-score-wrap">
      <span class="mini-score ${live?'live':''}">${scoreTxt}</span>
      ${penaltyTxt}
    </span>
  </div>`;
}

function miniCard(g, byId, isFinal = false) {
  if (!g) return '<div class="mini-card" style="opacity:0.3"><div class="mini-card-content"><div class="mini-row"></div><div class="mini-row"></div></div></div>';
  
  const done = g.finished === 'TRUE';
  const h = resolveLabel(g, 'h', byId);
  const a = resolveLabel(g, 'a', byId);
  
  return `<div class="mini-card ${done?'done':''} ${isFinal?'final':''}" data-match="${g.id}">
    <div class="mini-card-header">#${g.id}</div>
    <div class="mini-card-content">
      ${miniRow(h, g.home_score, g.home_penalty_score, done)}
      ${miniRow(a, g.away_score, g.away_penalty_score, done)}
    </div>
    <div class="mini-card-footer">${fmtDate(g.local_date)}</div>
  </div>`;
}

// Cada nivel va de hojas (1/16) hacia la raíz (semifinal). Los pares
// consecutivos del nivel inferior alimentan cada partido del nivel superior:
// levels[0][0],levels[0][1] -> levels[1][0]; levels[0][2],levels[0][3] -> levels[1][1]; etc.
const UPPER_LEVELS = [
  ['74', '77', '73', '75', '83', '84', '81', '82'], // 1/16
  ['89', '90', '93', '94'],                          // octavos
  ['97', '98'],                                      // cuartos
  ['101'],                                           // semifinal
];

const LOWER_LEVELS = [
  ['76', '78', '79', '80', '86', '88', '85', '87'], // 1/16
  ['91', '92', '95', '96'],                          // octavos
  ['99', '100'],                                     // cuartos
  ['102'],                                           // semifinal
];

function buildTreeNode(levels, byId, level, idx) {
  const id = levels[level][idx];
  const card = miniCard(byId[id], byId);
  if (level === 0) {
    return `<li>${card}</li>`;
  }
  const left = buildTreeNode(levels, byId, level - 1, idx * 2);
  const right = buildTreeNode(levels, byId, level - 1, idx * 2 + 1);
  return `<li>${card}<ul>${left}${right}</ul></li>`;
}

function buildHalfTree(levels, byId, flip) {
  const root = buildTreeNode(levels, byId, levels.length - 1, 0);
  return `<div class="tree-wrap ${flip ? 'flip' : ''}"><ul class="tree">${root}</ul></div>`;
}

function buildBracket(games) {
  const byId = {};
  games.forEach(g => { byId[String(g.id)] = g; });

  // Mitad superior: hojas arriba, convergiendo HACIA ABAJO hasta la semifinal
  // (justo encima de la final), igual que en la imagen de referencia.
  let html = buildHalfTree(UPPER_LEVELS, byId, true);

  html += `<div class="connector-v"></div>`;

  // FINAL EN EL CENTRO
  const final = byId['104'];
  const third = byId['103'];

  html += `<div class="center-final">
    <div class="trophy">🏆</div>
    <div class="final-row">
      <div class="final-block">
        <div class="final-title">Final</div>
        ${final ? miniCard(final, byId, true) : '<div class="mini-card final" style="opacity:0.3"><div class="mini-card-content"><div class="mini-row"></div><div class="mini-row"></div></div></div>'}
      </div>
      <div class="third-place">
        <div class="third-title">3er Puesto</div>
        ${third ? miniCard(third, byId) : '<div class="mini-card" style="opacity:0.3"><div class="mini-card-content"><div class="mini-row"></div><div class="mini-row"></div></div></div>'}
      </div>
    </div>
  </div>`;

  html += `<div class="connector-v"></div>`;

  // Mitad inferior: semifinal arriba (debajo de la final), expandiéndose
  // HACIA ABAJO hasta las hojas (1/16).
  html += buildHalfTree(LOWER_LEVELS, byId, false);

  document.getElementById('bracket').innerHTML = html;
}

async function load() {
  document.getElementById('dot').className = 'dot loading';
  document.getElementById('st').textContent = 'Actualizando…';
  try {
    const res = await fetch(`${PROXY}?proxy=games`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const games = Array.isArray(data) ? data : (data.games || []);
    if (!games.length) throw new Error('Sin partidos en la respuesta');

    buildBracket(games);
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('st').textContent = `${games.length} partidos cargados ✓`;

    const now = new Date();
    document.getElementById('upd').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}h`;
  } catch(e) {
    console.error(e);
    document.getElementById('bracket').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
    document.getElementById('dot').className = 'dot err';
    document.getElementById('st').textContent = 'Error al cargar';
  }
}

load();
setInterval(load, 120000);
</script>

</body>
</html>
