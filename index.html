<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bracket Mundial 2026</title>
<meta name="theme-color" content="#0a0a10">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #0a0a10;
  color: #f1f1f4;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: auto;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 14px 12px 10px;
  position: sticky;
  top: 0;
  background: #0a0a10;
  z-index: 10;
  border-bottom: 1px solid #1e1e2a;
}
.header h1 {
  font-size: .85rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #e5a93b;
  font-weight: 800;
}
.header .sub {
  font-size: .65rem;
  color: #555568;
  margin-top: 2px;
}
.status-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: .65rem;
  color: #555568;
  margin-top: 6px;
}
.dot { display:inline-block; width:7px; height:7px; border-radius:50%; }
.dot.loading { background:#fbbf24; animation:pulse 1.5s infinite; }
.dot.ok { background:#4ade80; }
.dot.err { background:#ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── Bracket wrapper ── */
.bracket-scroll {
  overflow-x: auto;
  padding: 20px 0 30px;
  -webkit-overflow-scrolling: touch;
}

/* ── Columna de ronda ── */
.round-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.round-label {
  font-size: .58rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #e5a93b;
  font-weight: 700;
  margin-bottom: 10px;
  white-space: nowrap;
  text-align: center;
  height: 18px;
}

/*
  CLAVE DEL FIX DE ALINEACIÓN
  ----------------------------
  Cada "slot" de partido en cualquier ronda ocupa el mismo alto base (SLOT_H),
  multiplicado por 2^ronda. Así, un partido de Octavos mide el doble que uno
  de 1/16, uno de Cuartos el doble que uno de Octavos, etc. Como cada slot
  se centra dentro de su propio alto (con flex+justify-content:center),
  el partido de la ronda siguiente queda matemáticamente alineado en el punto
  medio exacto entre los DOS partidos que lo alimentan en la ronda anterior.
  Esto reemplaza el "justify-content:space-around" sobre toda la columna,
  que repartía el espacio de forma pareja pero SIN relación real con qué
  partidos alimentan a cuál (causa del bug original: el resultado de
  CAN vs RSA aparecía a la altura visual de NED vs MAR).
*/
:root{
  --slot-h: 64px; /* alto base de un partido en la ronda más temprana (1/16) */
}

.round-slots {
  display: flex;
  flex-direction: column;
}

.match-slot {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Par de equipos (un match) ── */
.match-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ── Celdita de equipo ── */
.team-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 62px;
  padding: 4px 3px;
  border-radius: 6px;
  background: #14141e;
  border: 1px solid #2a2a3a;
  gap: 1px;
  position: relative;
  cursor: default;
  transition: border-color .2s;
}
.team-slot.winner { border-color: #e5a93b; background: #1a1610; }
.team-slot.loser  { opacity: .45; }
.team-slot.tbd    { border-color: #1e1e2e; }

.team-name {
  font-size: .48rem;
  font-weight: 700;
  color: #e5a93b;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
  overflow: hidden;
  max-width: 56px;
  text-overflow: ellipsis;
  text-align: center;
  line-height: 1;
}
.team-slot.tbd .team-name { color: #44444e; font-style: italic; }

.team-flag {
  width: 28px;
  height: 20px;
  border-radius: 2px;
  object-fit: cover;
  display: block;
}
.team-flag-ph {
  width: 28px;
  height: 20px;
  border-radius: 2px;
  background: #1e1e2e;
  border: 1px dashed #333;
}

.team-score {
  font-size: .65rem;
  font-weight: 800;
  color: #44445a;
  line-height: 1;
  min-height: 10px;
}
.team-score.has-score { color: #f1f1f4; }
.team-score.winning   { color: #4ade80; }

/* Separador entre los dos equipos */
.match-vs {
  font-size: .44rem;
  color: #333340;
  font-weight: 700;
  margin: 1px 0;
  line-height: 1;
}

/* Conector horizontal simple entre columnas */
.connector-col {
  width: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.connector-col .line {
  width: 14px;
  height: 2px;
  background: #2a2a3a;
}

/* ── Final central ── */
.final-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 16px;
}
.trophy-icon {
  font-size: 2rem;
  animation: float 3s ease-in-out infinite;
  line-height: 1;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.champion-label {
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #e5a93b;
  font-weight: 800;
  text-align: center;
  margin-bottom: 4px;
}
.champion-slot {
  width: 68px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border-radius: 8px;
  background: #1a1610;
  border: 2px solid #e5a93b;
  box-shadow: 0 0 18px rgba(229,169,59,.2);
}
.champion-slot .team-name { color: #e5a93b; font-size: .52rem; }
.champion-slot .team-score { color: #4ade80; font-size: .7rem; }

/* ── 3er puesto ── */
.third-section {
  text-align: center;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed #1e1e2a;
}
.third-label {
  font-size: .52rem;
  color: #5c85d6;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 4px;
}

/* ── Match info tooltip/label ── */
.match-info {
  font-size: .42rem;
  color: #333340;
  text-align: center;
  margin-top: 1px;
  white-space: nowrap;
}

/* ── Loading / Error ── */
.center-msg {
  text-align: center;
  padding: 60px 20px;
  color: #555568;
  font-size: .82rem;
}

.bracket-row {
  display: flex;
  align-items: stretch;
  gap: 0;
  min-width: max-content;
  padding: 0 12px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🏆 Fase Final · Mundial 2026</h1>
  <div class="sub">Datos en tiempo real · Horario Colombia (UTC−5)</div>
  <div class="status-bar">
    <span><span class="dot loading" id="dot"></span> <span id="st">Cargando…</span></span>
    <span id="upd">—</span>
  </div>
</div>

<div class="bracket-scroll">
  <div id="bracket-root" class="center-msg">Cargando bracket…</div>
</div>

<script>
const PROXY = "https://script.google.com/macros/s/AKfycby9V6YTOZcWTUD9NtmlFhgJTuIjkdREBGEfyrjSy8FLRvWrARBJn68JKTjVfzmLClkIEA/exec";

// ── Datos de selecciones ──────────────────────────────────
const FLAGS = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Korea Republic':'kr',
  'Czech Republic':'cz','Czechia':'cz','Switzerland':'ch','Canada':'ca',
  'Bosnia and Herzegovina':'ba','Bosnia':'ba','Qatar':'qa','Brazil':'br',
  'Morocco':'ma','Scotland':'gb-sct','Haiti':'ht','United States':'us','USA':'us',
  'Australia':'au','Paraguay':'py','Turkey':'tr','Türkiye':'tr','Germany':'de',
  'Ivory Coast':'ci',"Côte d'Ivoire":'ci','Ecuador':'ec','Curaçao':'cw','Curacao':'cw',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn','Belgium':'be',
  'Egypt':'eg','Iran':'ir','New Zealand':'nz','Spain':'es','Cape Verde':'cv',
  'Uruguay':'uy','Saudi Arabia':'sa','France':'fr','Norway':'no','Senegal':'sn',
  'Iraq':'iq','Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Democratic Republic of the Congo':'cd',
  'Uzbekistan':'uz','Colombia':'co','England':'gb-eng','Croatia':'hr',
  'Ghana':'gh','Panama':'pa',
};

const ABBR = {
  'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Korea Republic':'KOR',
  'Czech Republic':'CZE','Czechia':'CZE','Switzerland':'SUI','Canada':'CAN',
  'Bosnia and Herzegovina':'BIH','Bosnia':'BIH','Qatar':'QAT','Brazil':'BRA',
  'Morocco':'MAR','Scotland':'SCO','Haiti':'HAI','United States':'USA','USA':'USA',
  'Australia':'AUS','Paraguay':'PAR','Turkey':'TUR','Türkiye':'TUR','Germany':'GER',
  'Ivory Coast':'CIV',"Côte d'Ivoire":'CIV','Ecuador':'ECU','Curaçao':'CUW','Curacao':'CUW',
  'Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN','Belgium':'BEL',
  'Egypt':'EGY','Iran':'IRN','New Zealand':'NZL','Spain':'ESP','Cape Verde':'CPV',
  'Uruguay':'URU','Saudi Arabia':'KSA','France':'FRA','Norway':'NOR','Senegal':'SEN',
  'Iraq':'IRQ','Argentina':'ARG','Algeria':'ALG','Austria':'AUT','Jordan':'JOR',
  'Portugal':'POR','DR Congo':'COD','Democratic Republic of the Congo':'COD',
  'Uzbekistan':'UZB','Colombia':'COL','England':'ENG','Croatia':'CRO',
  'Ghana':'GHA','Panama':'PAN',
};

const pad = n => String(n).padStart(2,'0');
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function fmtDate(s) {
  if (!s) return '';
  const [dp, tp] = s.split(' ');
  const [mo,dd,yy] = dp.split('/');
  const d = new Date(`${yy}-${mo}-${dd}T${tp}:00-05:00`);
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${pad(d.getHours())}:${pad(d.getMinutes())}h`;
}

function isPending(name) {
  return !name || name.startsWith('Gan.') || name.startsWith('Per.')
    || name.startsWith('1.°') || name.startsWith('2.°')
    || name.startsWith('Mejor') || name === '–';
}

function getAbbr(name) {
  if (!name || name === '–') return '?';
  if (isPending(name)) {
    let m;
    m = name.match(/^Gan\. #(\d+)$/); if (m) return `G${m[1]}`;
    m = name.match(/^Per\. #(\d+)$/); if (m) return `P${m[1]}`;
    m = name.match(/^1\.° Grupo ([A-L])$/); if (m) return `1°${m[1]}`;
    m = name.match(/^2\.° Grupo ([A-L])$/); if (m) return `2°${m[1]}`;
    if (name.startsWith('Mejor')) return '3°';
    return '?';
  }
  return ABBR[name] || name.slice(0,3).toUpperCase();
}

function resolveLabel(g, side, byId, visited) {
  visited = visited || new Set();
  const id  = side === 'h' ? g.home_team_id  : g.away_team_id;
  const nm  = side === 'h' ? g.home_team_name_en : g.away_team_name_en;
  const lbl = side === 'h' ? g.home_team_label   : g.away_team_label;
  if (id && id !== '0' && nm) return nm;
  if (!lbl) return '–';
  let m;
  m = lbl.match(/^Winner Group ([A-L])$/);  if (m) return `1.° Grupo ${m[1]}`;
  m = lbl.match(/^Runner-up Group ([A-L])$/); if (m) return `2.° Grupo ${m[1]}`;
  m = lbl.match(/^3rd Group ([A-L/]+)$/); if (m) return `Mejor 3.° (${m[1]})`;
  m = lbl.match(/^Winner Match (\d+)$/);
  if (m) return resolveAdv(m[1], true, byId, visited) || `Gan. #${m[1]}`;
  m = lbl.match(/^Loser Match (\d+)$/);
  if (m) return resolveAdv(m[1], false, byId, visited) || `Per. #${m[1]}`;
  return lbl;
}

function resolveAdv(matchId, wantW, byId, visited) {
  if (!byId || visited.has(matchId)) return null;
  visited.add(matchId);
  const g = byId[String(matchId)];
  if (!g || g.finished !== 'TRUE') return null;
  const hs = parseFloat(g.home_score), as = parseFloat(g.away_score);
  if (isNaN(hs) || isNaN(as) || hs === as) return null;
  const homeAdv = wantW ? hs > as : hs < as;
  return resolveLabel(g, homeAdv ? 'h' : 'a', byId, visited);
}

// ── Render de una celda de equipo ────────────────────────
function teamSlotHtml(name, score, done, isWinner) {
  const pend = isPending(name);
  const abbr = getAbbr(name);
  const fc   = FLAGS[name];
  const flagHtml = (!pend && fc)
    ? `<img src="https://flagcdn.com/28x21/${fc}.png" class="team-flag"
          onerror="this.outerHTML='<span class=\\'team-flag-ph\\'></span>'">`
    : `<span class="team-flag-ph"></span>`;

  const hasScore = done && score !== null && score !== undefined && score !== 'null';
  const scoreClass = hasScore ? (isWinner ? 'has-score winning' : 'has-score') : '';
  const scoreTxt = hasScore ? score : (done ? '–' : '');

  const slotClass = pend ? 'tbd' : (isWinner ? 'winner' : (done ? 'loser' : ''));

  return `<div class="team-slot ${slotClass}">
    <div class="team-name">${abbr}</div>
    ${flagHtml}
    <div class="team-score ${scoreClass}">${scoreTxt}</div>
  </div>`;
}

// ── Render de un partido ──────────────────────────────────
function matchHtml(g, byId) {
  if (!g) return emptyMatchHtml();
  const done = g.finished === 'TRUE';
  const h = resolveLabel(g, 'h', byId);
  const a = resolveLabel(g, 'a', byId);
  const hs = done ? g.home_score : null;
  const as = done ? g.away_score : null;
  const hScore = hs !== null && hs !== undefined ? parseFloat(hs) : null;
  const aScore = as !== null && as !== undefined ? parseFloat(as) : null;
  const hWin = done && hScore !== null && aScore !== null && hScore > aScore;
  const aWin = done && hScore !== null && aScore !== null && aScore > hScore;

  return `<div class="match-group">
    ${teamSlotHtml(h, hs, done, hWin)}
    <div class="match-vs">vs</div>
    ${teamSlotHtml(a, as, done, aWin)}
    <div class="match-info">#${g.id} ${done ? '✓' : fmtDate(g.local_date).split(' ').slice(0,3).join(' ')}</div>
  </div>`;
}

function emptyMatchHtml() {
  return `<div class="match-group">
    ${teamSlotHtml('', null, false, false)}
    <div class="match-vs">vs</div>
    ${teamSlotHtml('', null, false, false)}
    <div class="match-info"></div>
  </div>`;
}

/*
  ── Ids por ronda, en ORDEN DE BRACKET (no en orden numérico de id) ──
  El orden dentro de cada array es CRÍTICO: el partido en la posición i de la
  ronda N+1 debe ser exactamente el cruce entre las posiciones (2i) y (2i+1)
  de la ronda N. Aquí es donde estaba el segundo posible foco de error: si el
  orden de los ids no refleja qué partido sale de cuál par, el alineamiento
  por posición (aunque ya esté arreglado en CSS) seguiría emparejando mal.

  Mapeo verificado partido-a-partido (avance estándar de bracket de 32):
   R16 (1/16):      73  74  75  76  77  78  79  80  |  81  82  83  84  85  86  87  88
   Octavos:           89      90      91      92    |    93      94      95      96
   Cuartos:               97              98          |        99             100
   Semis:                       101                    |              102
  Es decir: 73+74 -> 89 ; 75+76 -> 90 ; 77+78 -> 91 ; 79+80 -> 92
            89+90 -> 97 ; 91+92 -> 98
            97+98 -> 101
  (mismo patrón para el lado derecho)
*/
const leftRounds  = [
  [73,74,75,76,77,78,79,80],   // 1/16
  [89,90,91,92],               // Octavos
  [97,98],                     // Cuartos
  [101]                        // Semi
];
const rightRounds = [
  [81,82,83,84,85,86,87,88],   // 1/16
  [93,94,95,96],               // Octavos
  [99,100],                    // Cuartos
  [102]                        // Semi
];
const FINAL_ID = 104;
const THIRD_ID = 103;

const leftLabels  = ['1/16','Octavos','Cuartos','Semi'];
const rightLabelsReversed = ['Semi','Cuartos','Octavos','1/16'];

const SLOT_H = 64; // debe coincidir con --slot-h en CSS

function connectorColHtml() {
  return `<div class="connector-col"><div class="line"></div></div>`;
}

/*
  Construye una columna de ronda donde cada partido ocupa una "ranura" de alto
  SLOT_H * 2^roundIndex, centrado verticalmente dentro de su ranura.
  roundIndex = 0 para 1/16, 1 para Octavos, 2 para Cuartos, 3 para Semi.
  Esto garantiza que el partido i de la ronda roundIndex quede alineado
  exactamente en el punto medio de los partidos (2i, 2i+1) de la ronda
  roundIndex-1, sin depender de space-around ni de conteos dispares.
*/
function roundColumnHtml(ids, label, roundIndex, byId) {
  const slotHeight = SLOT_H * Math.pow(2, roundIndex);
  const slots = ids.map(id => {
    const inner = matchHtml(byId[String(id)], byId);
    return `<div class="match-slot" style="height:${slotHeight}px;">${inner}</div>`;
  }).join('');
  return `<div class="round-col">
    <div class="round-label">${label}</div>
    <div class="round-slots">${slots}</div>
  </div>`;
}

function sideLeftHtml(rounds, labels, byId) {
  const cols = rounds.map((ids, i) => roundColumnHtml(ids, labels[i], i, byId));
  return `<div class="bracket-row">${cols.join(connectorColHtml())}</div>`;
}

function sideRightHtml(rounds, labelsReversed, byId) {
  // rounds llega en orden [1/16, Octavos, Cuartos, Semi]; para el lado derecho
  // se dibuja en espejo: Semi, Cuartos, Octavos, 1/16 (de adentro hacia afuera)
  const reversedRounds = [...rounds].reverse();        // [Semi, Cuartos, Octavos, 1/16]
  const reversedIndexes = [3,2,1,0];                    // roundIndex real de cada una
  const cols = reversedRounds.map((ids, i) =>
    roundColumnHtml(ids, labelsReversed[i], reversedIndexes[i], byId)
  );
  return `<div class="bracket-row">${cols.join(connectorColHtml())}</div>`;
}

function finalCenterHtml(byId) {
  const finalGame = byId[String(FINAL_ID)];
  const thirdGame = byId[String(THIRD_ID)];

  const fh = finalGame ? resolveLabel(finalGame,'h',byId) : '–';
  const fa = finalGame ? resolveLabel(finalGame,'a',byId) : '–';
  const fdone = finalGame && finalGame.finished === 'TRUE';
  const fhs = fdone ? parseFloat(finalGame.home_score) : null;
  const fas = fdone ? parseFloat(finalGame.away_score) : null;
  const fhWin = fdone && fhs !== null && fas !== null && fhs > fas;
  const faWin = fdone && fhs !== null && fas !== null && fas > fhs;
  const champion = fhWin ? fh : (faWin ? fa : null);
  const championScore = fhWin ? fhs : (faWin ? fas : null);

  const champFlag = champion && FLAGS[champion]
    ? `<img src="https://flagcdn.com/28x21/${FLAGS[champion]}.png" class="team-flag"
           onerror="this.outerHTML='<span class=\\'team-flag-ph\\'></span>'">`
    : `<span class="team-flag-ph"></span>`;
  const champAbbr = champion ? getAbbr(champion) : '?';
  const champScoreTxt = championScore !== null ? championScore : '';

  const thDone = thirdGame && thirdGame.finished === 'TRUE';
  const thH = thirdGame ? resolveLabel(thirdGame,'h',byId) : '–';
  const thA = thirdGame ? resolveLabel(thirdGame,'a',byId) : '–';
  const thHWin = thDone && parseFloat(thirdGame.home_score) > parseFloat(thirdGame.away_score);
  const thAWin = thDone && parseFloat(thirdGame.away_score) > parseFloat(thirdGame.home_score);

  return `<div class="final-col">
    <div class="round-label" style="margin-bottom:6px">FINAL</div>
    <div class="trophy-icon">🏆</div>
    <div class="champion-label">CAMPEÓN</div>
    <div class="champion-slot">
      <div class="team-name" style="color:#e5a93b;font-size:.52rem;">${champAbbr}</div>
      ${champFlag}
      <div class="team-score" style="color:#4ade80;font-size:.7rem;font-weight:900;">${champScoreTxt}</div>
    </div>
    <div style="margin-top:6px;width:2px;height:18px;background:#2a2a3a;margin-left:auto;margin-right:auto;"></div>
    ${finalGame ? `<div class="match-group" style="margin-top:2px;">
      ${teamSlotHtml(fh, fdone?finalGame.home_score:null, fdone, fhWin)}
      <div class="match-vs">vs</div>
      ${teamSlotHtml(fa, fdone?finalGame.away_score:null, fdone, faWin)}
      <div class="match-info">#${FINAL_ID}</div>
    </div>` : emptyMatchHtml()}
    <div class="third-section">
      <div class="third-label">🥉 3er Puesto</div>
      ${thirdGame ? `<div class="match-group">
        ${teamSlotHtml(thH, thDone?thirdGame.home_score:null, thDone, thHWin)}
        <div class="match-vs">vs</div>
        ${teamSlotHtml(thA, thDone?thirdGame.away_score:null, thDone, thAWin)}
        <div class="match-info">#${THIRD_ID}</div>
      </div>` : emptyMatchHtml()}
    </div>
  </div>`;
}

// ── Construcción del bracket ──────────────────────────────
function buildBracket(games) {
  const byId = {};
  games.forEach(g => { byId[String(g.id)] = g; });

  const leftHtml  = sideLeftHtml(leftRounds, leftLabels, byId);
  const rightHtml = sideRightHtml(rightRounds, rightLabelsReversed, byId);
  const centerHtml = finalCenterHtml(byId);

  const html = `<div class="bracket-row" style="align-items:center;">
    ${leftHtml}
    ${connectorColHtml()}
    ${centerHtml}
    ${connectorColHtml()}
    ${rightHtml}
  </div>`;

  document.getElementById('bracket-root').innerHTML = html;
  document.getElementById('bracket-root').className = '';
  document.getElementById('bracket-root').style = 'overflow-x:auto;padding:16px 0 30px;-webkit-overflow-scrolling:touch;';
}

// ── Carga ─────────────────────────────────────────────────
async function load() {
  document.getElementById('dot').className = 'dot loading';
  document.getElementById('st').textContent = 'Actualizando…';
  try {
    const res  = await fetch(`${PROXY}?proxy=games`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const games = Array.isArray(data) ? data : (data.games || []);
    if (!games.length) throw new Error('Sin partidos');
    buildBracket(games);
    document.getElementById('dot').className = 'dot ok';
    document.getElementById('st').textContent = `${games.length} partidos ✓`;
    const now = new Date();
    document.getElementById('upd').textContent = `Act. ${pad(now.getHours())}:${pad(now.getMinutes())}h`;
  } catch(e) {
    console.error(e);
    document.getElementById('bracket-root').innerHTML = `<div class="center-msg">❌ ${e.message}</div>`;
    document.getElementById('dot').className = 'dot err';
    document.getElementById('st').textContent = 'Error';
  }
}

load();
setInterval(load, 120000);
</script>
</body>
</html>
