<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#e5a93b;--green:#4ade80;--red:#ef4444;--blue:#5c85d6;
  --bg:#0f0f12;--card:#17171f;--border:#2a2a38;
  --text:#f1f1f4;--muted:#8a8a9e;--dim:#3a3a50;--line:rgba(229,169,59,0.30);
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  padding:14px 6px calc(env(safe-area-inset-bottom)+24px);
}

/* ── Cabecera ── */
.hdr{text-align:center;margin-bottom:10px}
.hdr h1{font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#fff;line-height:1.2}
.hdr .sub{font-size:.65rem;color:var(--muted);margin-top:2px}
.sbar{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:.65rem;color:var(--muted);margin-bottom:14px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.loading{background:#fbbf24;animation:pulse 1.5s infinite}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ══════════════════════════════════════════
   ÁRBOL VERTICAL SIMÉTRICO

   Layout por ronda (de arriba hacia abajo):
   R16:  8 col ─── 8 col   (16 partidos, lado izq | lado der)
   R8:   4 col ─── 4 col   (8 partidos)
   QF:   2 col ─── 2 col   (4 partidos)
   SF:   1 col ─── 1 col   (2 partidos)
   FINAL:    centro         (1 partido)

   Cada "lado" converge hacia el centro.
   El lado izquierdo crece de izquierda→centro,
   el lado derecho crece de derecha→centro.
══════════════════════════════════════════ */

.bracket{width:100%;position:relative}

/* Etiqueta flotante de ronda */
.rlbl{
  text-align:center;font-size:.52rem;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;color:var(--gold);
  margin:0 0 4px;position:relative;
}
.rlbl::before,.rlbl::after{
  content:'';position:absolute;top:50%;height:1px;width:30%;
  background:linear-gradient(to right,transparent,var(--border));
}
.rlbl::before{left:0;background:linear-gradient(to right,transparent,var(--border))}
.rlbl::after{right:0;background:linear-gradient(to left,transparent,var(--border))}

/* Una fila = una ronda. Dos mitades simétricas. */
.brow{
  display:flex;
  gap:var(--gap);
  align-items:flex-start;
  margin-bottom:0;
  padding:0;
}

/* ── Mini-card ──────────────────────────────────────
   Layout interno por EQUIPO:
     [Nombre   ] [gol]
     [  bandera] [gol]  ← bandera grande centrada dentro
   Realmente hacemos:
     fila superior: nombre + score
     bandera centrada
   Más compacto que antes.
─────────────────────────────────────────────────── */
.mc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 4px 3px;
  display:flex;flex-direction:column;
  align-items:stretch;
  gap:0;
  flex-shrink:0;
  /* width se asigna inline */
}
.mc.done{border-color:var(--green)}
.mc.live-now{border-color:#fbbf24}

/* Equipo: nombre arriba, bandera+gol en fila */
.mteam{
  display:flex;flex-direction:column;
  align-items:center;
  padding:2px 2px 2px;
  gap:2px;
}
.mteam+.mteam{border-top:1px solid #1e1e2a;margin-top:1px}

.mname{
  font-size:.54rem;font-weight:700;letter-spacing:.3px;
  color:var(--gold);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  width:100%;text-align:center;line-height:1.1;
}
.mname.pend{color:var(--dim);font-style:italic;font-weight:500;font-size:.5rem}

/* Fila bandera + gol */
.mfrow{display:flex;align-items:center;justify-content:center;gap:3px;width:100%}
.mflag{width:22px;height:16px;border-radius:2px;object-fit:cover;flex-shrink:0}
.mflag-ph{width:22px;height:16px;border-radius:2px;background:#1e1e2a;border:1px dashed #2e2e40;flex-shrink:0}
.mscore{
  font-size:.64rem;font-weight:800;color:var(--dim);
  min-width:13px;text-align:center;line-height:1;
}
.mscore.live{color:var(--green)}

/* fecha debajo */
.mdate{font-size:.46rem;color:var(--muted);text-align:center;
  margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.15;border-top:1px solid #1a1a26;padding-top:2px}

/* ── SVG conectores ── */
.conn{display:block;width:100%;overflow:visible;pointer-events:none;flex-shrink:0}

/* ── Spotlight Final ── */
.spot-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:6px}
.spotlight{
  width:100%;max-width:300px;
  background:linear-gradient(135deg,#211a09,#17171f);
  border:2px solid var(--gold);border-radius:14px;
  padding:12px 12px 10px;
  box-shadow:0 0 24px rgba(229,169,59,.15);
}
.trophy{font-size:1.6rem;text-align:center;display:block;margin-bottom:3px;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.sp-lbl{text-align:center;font-size:.55rem;font-weight:800;text-transform:uppercase;
  letter-spacing:1.3px;margin-bottom:8px}
.sp-lbl.gold{color:var(--gold)}.sp-lbl.blue{color:var(--blue)}

.sp-match{display:flex;align-items:center;justify-content:center;gap:6px}
.sp-team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.sp-nm{font-size:.63rem;font-weight:700;text-transform:uppercase;color:var(--gold);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;text-align:center}
.sp-nm.pend{color:var(--dim);font-style:italic}
.sp-flag{width:42px;height:30px;border-radius:3px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.sp-flag-ph{width:42px;height:30px;border-radius:3px;background:#1e1e2a;border:1px dashed #35354a}
.sp-sc{font-size:1.05rem;font-weight:900;color:var(--dim)}.sp-sc.live{color:var(--green)}
.sp-vs{font-size:.6rem;color:var(--dim);font-weight:700;flex-shrink:0}
.sp-date{text-align:center;font-size:.53rem;color:var(--muted);margin-top:6px}

.third-box{
  width:100%;max-width:300px;
  background:linear-gradient(135deg,#0d1220,#17171f);
  border:1px solid var(--blue);border-radius:11px;
  padding:10px 12px 9px;
}

.loading-msg{color:var(--muted);text-align:center;padding:40px 14px;font-size:.85rem}
.err-msg{color:var(--red);text-align:center;padding:30px 14px}

/* ── Install banner ── */
.install-banner{
  position:fixed;left:10px;right:10px;
  bottom:calc(env(safe-area-inset-bottom)+10px);
  background:linear-gradient(135deg,#2e2413,#1a1a24);
  border:1px solid var(--gold);border-radius:12px;
  padding:11px 11px 11px 13px;display:none;align-items:center;
  gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-text{flex:1;font-size:.72rem;line-height:1.4;color:var(--text)}
.install-text strong{color:var(--gold)}
.share-ico{width:13px;height:13px;vertical-align:-2px;margin:0 1px;fill:var(--gold)}
.install-btn{background:var(--gold);color:#1a1a24;font-weight:700;font-size:.72rem;
  border:none;border-radius:7px;padding:7px 11px;flex-shrink:0;cursor:pointer}
.install-close{background:transparent;border:none;color:var(--muted);font-size:.95rem;
  padding:2px 3px;cursor:pointer;flex-shrink:0}
</style>
</head>

<script>
const PROXY="https://script.google.com/macros/s/AKfycby9V6YTOZcWTUD9NtmlFhgJTuIjkdREBGEfyrjSy8FLRvWrARBJn68JKTjVfzmLClkIEA/exec";

/* ── Datos estáticos ── */

  'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Korea Republic':'KOR',

  'Australia':'AUS','Paraguay':'PAR','Turkey':'TUR','Türkiye':'TUR','Germany':'GER',
  'Ivory Coast':'CIV',"Côte d'Ivoire":'CIV','Ecuador':'ECU','Curaçao':'CUW',
  'Curacao':'CUW','Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN',
  'Belgium':'BEL','Egypt':'EGY','Iran':'IRN','New Zealand':'NZL','Spain':'ESP',
  'Cape Verde':'CPV','Uruguay':'URU','Saudi Arabia':'KSA','France':'FRA',
  'Norway':'NOR','Senegal':'SEN','Iraq':'IRQ','Argentina':'ARG','Algeria':'ALG',
  'Austria':'AUT','Jordan':'JOR','Portugal':'POR','DR Congo':'COD',
  'Democratic Republic of the Congo':'COD','Uzbekistan':'UZB','Colombia':'COL',
  'England':'ENG','Croatia':'CRO','Ghana':'GHA','Panama':'PAN',
};
const TEAM_ES={
  'Mexico':'México','South Africa':'S.África','South Korea':'Corea S','Korea Republic':'Corea S',
  'Czech Republic':'Chequia','Czechia':'Chequia','Switzerland':'Suiza','Canada':'Canadá',
  'Bosnia and Herzegovina':'Bosnia','Bosnia':'Bosnia','Brazil':'Brasil',
  'Morocco':'Marruecos','Scotland':'Escocia','Haiti':'Haití',
  'United States':'EE.UU.','USA':'EE.UU.','Turkey':'Turquía','Türkiye':'Turquía',
  'Germany':'Alemania','Ivory Coast':'C.Marfil',"Côte d'Ivoire":'C.Marfil',
  'Ecuador':'Ecuador','Curaçao':'Curazao','Curacao':'Curazao',
  'Netherlands':'Holanda','Japan':'Japón','Sweden':'Suecia','Tunisia':'Túnez',
  'Belgium':'Bélgica','Egypt':'Egipto','Iran':'Irán','New Zealand':'N.Zelanda',
  'Spain':'España','Cape Verde':'C.Verde','Uruguay':'Uruguay','Saudi Arabia':'Arabia S',
  'France':'Francia','Norway':'Noruega','Senegal':'Senegal','Iraq':'Irak',
  'Argentina':'Argentina','Algeria':'Argelia','Austria':'Austria','Jordan':'Jordania',
  'Portugal':'Portugal','DR Congo':'RD Congo','Democratic Republic of the Congo':'RD Congo',
  'Uzbekistan':'Uzbekistán','Colombia':'Colombia','England':'Inglaterra',
  'Croatia':'Croacia','Ghana':'Ghana','Panama':'Panamá','Australia':'Australia','Paraguay':'Paraguay',
};

const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const pad=n=>String(n).padStart(2,'0');

function fmtDate(s){
  if(!s)return'';
  const[dp,tp]=s.split(' ');const[mo,dd,yy]=dp.split('/');
  const d=new Date(`${yy}-${mo}-${dd}T${tp}:00-05:00`);
  return`${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${pad(d.getHours())}:${pad(d.getMinutes())}h`;
}

function isPending(n){
  return!n||n.startsWith('Gan.')||n.startsWith('Per.')
    ||n.startsWith('1.°')||n.startsWith('2.°')||n.startsWith('Mejor');
}
function resolveLabel(g,side,byId,visited){
  visited=visited||new Set();
  const id=side==='h'?g.home_team_id:g.away_team_id;
  const nm=side==='h'?g.home_team_name_en:g.away_team_name_en;
  const lbl=side==='h'?g.home_team_label:g.away_team_label;
  if(id&&id!=='0'&&nm)return nm;
  if(!lbl)return'–';
  let m;
  m=lbl.match(/^Winner Group ([A-L])$/);   if(m)return`1.° Grupo ${m[1]}`;
  m=lbl.match(/^Runner-up Group ([A-L])$/);if(m)return`2.° Grupo ${m[1]}`;
  m=lbl.match(/^3rd Group ([A-L/]+)$/);    if(m)return`Mejor 3.° (${m[1]})`;
  m=lbl.match(/^Winner Match (\d+)$/);
  if(m)return resolveAdv(m[1],true,byId,visited)||`Gan. #${m[1]}`;
  m=lbl.match(/^Loser Match (\d+)$/);
  if(m)return resolveAdv(m[1],false,byId,visited)||`Per. #${m[1]}`;
  return lbl;
}
function resolveAdv(mid,want,byId,visited){
  if(!byId||visited.has(mid))return null;visited.add(mid);
  const g=byId[String(mid)];if(!g||g.finished!=='TRUE')return null;
  const hs=parseFloat(g.home_score),as=parseFloat(g.away_score);
  if(isNaN(hs)||isNaN(as)||hs===as)return null;
  return resolveLabel(g,(want?hs>as:hs<as)?'h':'a',byId,visited);
}
function shortName(raw){
  if(!raw||raw==='–')return'?';
  if(isPending(raw)){
    let m;
    m=raw.match(/^Gan\. #(\d+)$/);if(m)return`G${m[1]}`;
    m=raw.match(/^Per\. #(\d+)$/);if(m)return`P${m[1]}`;
    m=raw.match(/^1\.° Grupo ([A-L])$/);if(m)return`1°${m[1]}`;
    m=raw.match(/^2\.° Grupo ([A-L])$/);if(m)return`2°${m[1]}`;
    if(raw.startsWith('Mejor'))return'3°';return'?';
  }
  return ABBR[raw]||(TEAM_ES[raw]||raw).slice(0,6);
}
function flagEl(name,cls,w,h){
  const code=FLAGS[name];
  if(!code||isPending(name))return`<span class="${cls}-ph"></span>`;
  return`<img src="https://flagcdn.com/${w}x${h}/${code}.png" alt="${name}" class="${cls}"
    onerror="this.outerHTML='<span class=\\'${cls}-ph\\'></span>'">`;
}

/* ─────────────────────────────────────────────────────────
   mkMini: mini-tarjeta vertical
   Nombre arriba, [bandera + gol] al medio, fecha abajo
───────────────────────────────────────────────────────── */
function mkMini(g,byId,w){
  if(!g)return`<div class="mc" style="width:${w}px;min-height:60px;opacity:.15"></div>`;
  const done=g.finished==='TRUE';
  const h=resolveLabel(g,'h',byId),a=resolveLabel(g,'a',byId);
  const hp=isPending(h),ap=isPending(a);
  const hsc=(done&&g.home_score!=null&&g.home_score!='null')?g.home_score:'–';
  const asc=(done&&g.away_score!=null&&g.away_score!='null')?g.away_score:'–';
  const hFull=hp?h:(TEAM_ES[h]||h);const aFull=ap?a:(TEAM_ES[a]||a);
  return`<div class="mc ${done?'done':''}" style="width:${w}px" title="#${g.id}">
    <div class="mteam">
      <div class="mname ${hp?'pend':''}">${shortName(h)}</div>
      <div class="mfrow" title="${hFull}">
        ${flagEl(h,'mflag',22,16)}
        <span class="mscore ${done?'live':''}">${hsc}</span>
      </div>
    </div>
    <div class="mteam">
      <div class="mname ${ap?'pend':''}">${shortName(a)}</div>
      <div class="mfrow" title="${aFull}">
        ${flagEl(a,'mflag',22,16)}
        <span class="mscore ${done?'live':''}">${asc}</span>
      </div>
    </div>
    <div class="mdate">${fmtDate(g.local_date)}</div>
  </div>`;
}

/* Spotlight Final / 3er Puesto */
function spMatch(g,byId){
  if(!g)return`<div style="color:var(--muted);font-size:.62rem;text-align:center;padding:8px">Por definir</div>`;
  const done=g.finished==='TRUE';
  const h=resolveLabel(g,'h',byId),a=resolveLabel(g,'a',byId);
  const hp=isPending(h),ap=isPending(a);
  const hsc=(done&&g.home_score!=null&&g.home_score!='null')?g.home_score:'–';
  const asc=(done&&g.away_score!=null&&g.away_score!='null')?g.away_score:'–';
  return`<div>
    <div class="sp-match">
      <div class="sp-team" title="${hp?h:(TEAM_ES[h]||h)}">
        <div class="sp-nm ${hp?'pend':''}">${shortName(h)}</div>
        ${flagEl(h,'sp-flag',42,30)}
        <div class="sp-sc ${done?'live':''}">${hsc}</div>
      </div>
      <div class="sp-vs">VS</div>
      <div class="sp-team" title="${ap?a:(TEAM_ES[a]||a)}">
        <div class="sp-nm ${ap?'pend':''}">${shortName(a)}</div>
        ${flagEl(a,'sp-flag',42,30)}
        <div class="sp-sc ${done?'live':''}">${asc}</div>
      </div>
    </div>
    <div class="sp-date">${fmtDate(g.local_date)}</div>
  </div>`;
}

/*
  ═══════════════════════════════════════════════════════════
  ESTRUCTURA DEL BRACKET SIMÉTRICO VERTICAL

  El árbol original (horizontal) tenía:
    Lado IZQUIERDO (L): R16ids[0..7]  → R8ids[0..3] → QFids[0..1] → SF[0]
    Lado DERECHO   (R): R16ids[8..15] → R8ids[4..7] → QFids[2..3] → SF[1]
    Ambos lados convergen en la FINAL (104).

  En la versión VERTICAL, rotamos 90°:
    - Cada ronda es una FILA horizontal
    - La mitad izquierda del bracket original se convierte en
      la mitad SUPERIOR de cada fila (columnas izquierdas)
    - La mitad derecha → columnas derechas
    - Las tarjetas se centran hacia el medio en cada ronda
    - Los conectores SVG "en V" unen pares padre→hijo

  IDs exactos del árbol verificado:
  ═══════════════════════════════════════════════════════════
*/

// Lado izquierdo original (→ columnas izquierdas, de exterior a interior)
const L_R16 = [74, 77, 73, 75, 83, 84, 81, 82]; // 8 partidos
const L_R8  = [89, 90, 93, 94];                  // 4 partidos
const L_QF  = [97, 98];                          // 2 partidos
const L_SF  = [101];                             // 1 partido

// Lado derecho original (→ columnas derechas, de interior a exterior)
const R_SF  = [102];
const R_QF  = [99, 100];
const R_R8  = [91, 92, 95, 96];
const R_R16 = [76, 78, 79, 80, 86, 88, 85, 87];

function buildBracket(games){
  const byId={};games.forEach(g=>{byId[String(g.id)]=g;});

  // Ancho total disponible
  const vw=Math.min(window.innerWidth,520);
  const W=vw-12; // padding cuerpo 6px×2
  const GAP=3;

  // Para cada ronda, hay (n_izq + n_der) tarjetas en la fila
  // R16: 8+8=16  → cw=(W-15*GAP)/16
  // R8:  4+4=8   → cw=(W-7*GAP)/8
  // QF:  2+2=4   → cw=(W-3*GAP)/4
  // SF:  1+1=2   → cw=(W-1*GAP)/2
  const cw={
    r16: Math.floor((W-15*GAP)/16),
    r8:  Math.floor((W-7*GAP)/8),
    qf:  Math.floor((W-3*GAP)/4),
    sf:  Math.floor((W-GAP)/2),
  };

  // SVG de conectores entre ronda A (n tarjetas por lado) y ronda B (n/2 por lado)
  // Cada par de tarjetas adyacentes del mismo lado converge en una tarjeta hija
  // centrada entre ambas.
  function connSVG(nPerSide, cwParent, cwChild, h){
    // Fila padre: [L side: nPerSide cards] [R side: nPerSide cards]
    // Fila hijo:  [L side: nPerSide/2 cards] [R side: nPerSide/2 cards]
    // Total width padre = nPerSide*2*cwParent + (nPerSide*2-1)*GAP
    const totalCols = nPerSide*2;
    const totalW = totalCols*cwParent + (totalCols-1)*GAP;
    const childTotalW = (nPerSide)*cwChild + (nPerSide-1)*GAP; // cada lado
    // Offset para centrar el hijo respecto al padre
    // El padre tiene ancho totalW, el hijo tiene 2*childTotalW + GAP
    const childFullW = 2*cwChild*(nPerSide/2)*2; // approx — calculamos por posición

    const lines=[];
    // Para cada par padre (i, i+1) → hijo i//2
    // Los pares izquierdos: índices 0..nPerSide-1, pares de 2
    // Los pares derechos: índices nPerSide..totalCols-1, pares de 2

    // Posición X del centro de la tarjeta en el índice col (0-based)
    const cx=col=>col*(cwParent+GAP)+cwParent/2;

    // Hijo: mismo layout pero con cwChild
    // Lado izquierdo hijo: cols 0..nPerSide/2-1
    // Lado derecho hijo:   cols nPerSide/2..nPerSide-1
    // pero el hijo tiene totalCols/2 tarjetas total
    // En el SVG del hijo, vamos a calcular su centro relativo al padre
    // El hijo está centrado → su offset desde el borde izquierdo del padre:
    const childCols=nPerSide; // total columnas en la fila hija
    const childTW=childCols*cwChild+(childCols-1)*GAP;
    const childOffsetX=(totalW-childTW)/2;
    const cxChild=col=>childOffsetX+col*(cwChild+GAP)+cwChild/2;

    // Conectar cada par del lado izquierdo
    for(let i=0;i<nPerSide;i+=2){
      const x1=cx(i), x2=cx(i+1);
      const xm=cxChild(i/2);
      lines.push(`<path d="M${x1} 0 C${x1} ${h*.6},${xm} ${h*.4},${xm} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>`);
      lines.push(`<path d="M${x2} 0 C${x2} ${h*.6},${xm} ${h*.4},${xm} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>`);
    }
    // Conectar cada par del lado derecho
    for(let i=0;i<nPerSide;i+=2){
      const col=nPerSide+i;
      const x1=cx(col), x2=cx(col+1);
      const xm=cxChild(nPerSide/2+i/2);
      lines.push(`<path d="M${x1} 0 C${x1} ${h*.6},${xm} ${h*.4},${xm} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>`);
      lines.push(`<path d="M${x2} 0 C${x2} ${h*.6},${xm} ${h*.4},${xm} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>`);
    }

    return`<svg class="conn" height="${h}" width="${totalW}" viewBox="0 0 ${totalW} ${h}"
      style="display:block;margin:0 auto">${lines.join('')}</svg>`;
  }

  // Conector SF → Final (2 tarjetas → 1 spotlight en el centro)
  function connSF2Final(cwSF, h){
    const totalW=2*cwSF+GAP;
    const xL=cwSF/2, xR=cwSF+GAP+cwSF/2, xM=totalW/2;
    return`<svg class="conn" height="${h}" width="${totalW}" viewBox="0 0 ${totalW} ${h}"
      style="display:block;margin:0 auto">
      <path d="M${xL} 0 C${xL} ${h*.6},${xM} ${h*.4},${xM} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>
      <path d="M${xR} 0 C${xR} ${h*.6},${xM} ${h*.4},${xM} ${h}" stroke="var(--line)" stroke-width="1.2" fill="none"/>
    </svg>`;
  }

  // Construir una fila de partidos combinando lado izq + der
  function buildRow(leftIds, rightIds, cw){
    const allIds=[...leftIds,...rightIds];
    return`<div class="brow" style="gap:${GAP}px;justify-content:center">
      ${allIds.map(id=>mkMini(byId[String(id)],byId,cw)).join('')}
    </div>`;
  }

  let html='';

  // ── 1/16 ──
  html+=`<div class="rlbl">1/16 · Dieciseisavos</div>`;
  html+=buildRow(L_R16, R_R16, cw.r16);
  html+=connSVG(8, cw.r16, cw.r8, 18);

  // ── Octavos ──
  html+=`<div class="rlbl">Octavos de Final</div>`;
  html+=buildRow(L_R8, R_R8, cw.r8);
  html+=connSVG(4, cw.r8, cw.qf, 18);

  // ── Cuartos ──
  html+=`<div class="rlbl">Cuartos de Final</div>`;
  html+=buildRow(L_QF, R_QF, cw.qf);
  html+=connSVG(2, cw.qf, cw.sf, 18);

  // ── Semis ──
  html+=`<div class="rlbl">Semifinales</div>`;
  html+=buildRow(L_SF, R_SF, cw.sf);
  html+=connSF2Final(cw.sf, 20);

  // ── Final + 3er Puesto ──
  html+=`<div class="rlbl">🏆 Gran Final</div>`;
  html+=`<div class="spot-wrap">
    <div class="spotlight">
      <span class="trophy">🏆</span>
      <div class="sp-lbl gold">Final · 19 Jul 2026</div>
      ${spMatch(byId['104'],byId)}
    </div>
    <div class="third-box">
      <div class="sp-lbl blue">3.er Puesto · 18 Jul 2026</div>
      ${spMatch(byId['103'],byId)}
    </div>
  </div>`;

  document.getElementById('bracket').innerHTML=html;
}

/* ── Carga ── */
async function load(){
  document.getElementById('dot').className='dot loading';
  document.getElementById('st').textContent='Actualizando…';
  try{
    const res=await fetch(`${PROXY}?proxy=games`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const games=Array.isArray(data)?data:(data.games||[]);
    if(!games.length)throw new Error('Sin partidos');
    buildBracket(games);
    document.getElementById('dot').className='dot ok';
    document.getElementById('st').textContent=`${games.length} partidos ✓`;
    const now=new Date();
    document.getElementById('upd').textContent=
      `Actualizado: ${pad(now.getHours())}:${pad(now.getMinutes())}h`;
  }catch(e){
    console.error(e);
    document.getElementById('bracket').innerHTML=`<div class="err-msg">❌ ${e.message}</div>`;
    document.getElementById('dot').className='dot err';
    document.getElementById('st').textContent='Error';
  }
}
load();
setInterval(load,120000);

let resizeT;
window.addEventListener('resize',()=>{clearTimeout(resizeT);resizeT=setTimeout(load,200);});

/* ── Banner instalación ── */
const IK='mundial2026_install_v1';
const isIos=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStand=()=>window.matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
const wasDism=()=>{try{return localStorage.getItem(IK)==='1'}catch{return false}};
function dismissB(){
  document.getElementById('installBanner').style.display='none';
  try{localStorage.setItem(IK,'1')}catch{}
}
const SICO=`<svg class="share-ico" viewBox="0 0 24 24"><path d="M12 2l-5 5h3v9h4V7h3l-5-5zM5 13v7a2 2 0 002 2h10a2 2 0 002-2v-7h-2v7H7v-7H5z"/></svg>`;
function showIosBanner(){
  if(isStand()||wasDism())return;
  const el=document.getElementById('installBanner');
  el.innerHTML=`<span class="install-text">Instala: toca ${SICO} <strong>Compartir</strong> → <strong>"Agregar a inicio"</strong></span>
    <button class="install-close" id="iC">✕</button>`;
  el.style.display='flex';
  document.getElementById('iC').onclick=dismissB;
}
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();dp=e;
  if(isStand()||wasDism())return;
  const el=document.getElementById('installBanner');
  el.innerHTML=`<span class="install-text">Instala para abrirla sin el navegador.</span>
    <button class="install-btn" id="iN">Instalar</button>
    <button class="install-close" id="iC">✕</button>`;
  el.style.display='flex';
  document.getElementById('iC').onclick=dismissB;
  document.getElementById('iN').onclick=async()=>{
    el.style.display='none';
    if(dp){dp.prompt();await dp.userChoice;dp=null;}
  };
});
if(isIos()&&!isStand()&&!wasDism())setTimeout(showIosBanner,1500);
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
