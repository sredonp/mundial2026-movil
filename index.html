<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fase Final Mundial 2026</title>

  <!-- PWA: manifest, íconos y color de tema -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f12">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mundial 2026">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #0a0e27;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      background-attachment: fixed;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior-y: none;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: #888;
    }

    .status-bar {
      text-align: center;
      margin-bottom: 15px;
      font-size: 0.8rem;
      color: #666;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .dot.ok { background: #4caf50; }
    .dot.loading { background: #ff9800; animation: pulse 1.5s infinite; }
    .dot.err { background: #f44336; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .bracket-wrapper {
      position: relative;
      margin: 20px auto;
      max-width: 100%;
      overflow-x: auto;
    }

    .bracket-container {
      position: relative;
      display: inline-block;
      width: max-content;
      padding: 20px;
    }

    /* ===== ÁRBOL VERTICAL (arriba/abajo, como la llave de referencia) ===== */
    .bracket-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .connector-v {
      width: 0;
      height: 30px;
      border-left: 2px solid #ffd700;
      margin: 0 auto;
    }

    /* Mitad superior: las hojas quedan arriba y convergen HACIA ABAJO hasta la
       semifinal (justo encima de la FINAL). Se construye el árbol normal
       (raíz arriba) y se invierte verticalmente con scaleY(-1); el contenido
       de cada tarjeta se vuelve a invertir para que se lea correctamente. */
    .tree-wrap.flip {
      transform: scaleY(-1);
    }
    .tree-wrap.flip .mini-card {
      transform: scaleY(-1);
    }

    .tree-wrap {
      display: inline-block;
    }

    .tree, .tree ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: inline-block;
    }

    .tree ul {
      position: relative;
      padding-top: 30px;
    }
    .tree ul::after {
      content: "";
      display: table;
      clear: both;
    }

    .tree li {
      float: left;
      text-align: center;
      list-style-type: none;
      position: relative;
      padding: 30px 8px 0 8px;
    }

    .tree li::before,
    .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      width: 50%;
      height: 30px;
      border-top: 2px solid #4a9eff;
    }
    .tree li::after {
      right: auto;
      left: 50%;
      border-left: 2px solid #4a9eff;
    }
    .tree li:only-child::after,
    .tree li:only-child::before {
      display: none;
    }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before,
    .tree li:last-child::after {
      border: 0 none;
    }
    .tree li:last-child::before {
      border-right: 2px solid #4a9eff;
    }
    .tree > li {
      padding-top: 0;
    }
    .tree > li::before,
    .tree > li::after {
      display: none;
    }
    .tree li ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 0;
      height: 30px;
      border-left: 2px solid #4a9eff;
    }

    /* ===== CASILLAS ===== */
    .mini-card {
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin: 0 auto;
      background: linear-gradient(135deg, #1a2555 0%, #2d3e5f 100%);
      border: 2px solid #4a9eff;
      border-radius: 8px;
      width: 105px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.2);
    }

    .mini-card:hover {
      border-color: #ffd700;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
      transform: scale(1.08);
    }

    .mini-card.done {
      border-color: #4caf50;
    }

    .mini-card-live {
      position: absolute;
      top: -7px;
      right: -7px;
      background: #ff4444;
      color: #fff;
      font-size: 0.55rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      letter-spacing: 0.3px;
      box-shadow: 0 0 0 2px #0f1729;
      animation: livePulse 1.4s infinite;
      z-index: 2;
    }

    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 2px #0f1729, 0 0 0 0 rgba(255,68,68,0.6); }
      50% { box-shadow: 0 0 0 2px #0f1729, 0 0 0 5px rgba(255,68,68,0); }
    }

    .mini-card-header {
      background: #0f1729;
      padding: 2px 3px;
      text-align: center;
      font-size: 0.6rem;
      color: #888;
      border-bottom: 1px solid rgba(74, 158, 255, 0.3);
    }

    .mini-card-content {
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .mini-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 4px;
      min-height: 48px;
      border-bottom: 1px solid rgba(74, 158, 255, 0.2);
      position: relative;
      flex: 1;
      gap: 2px;
    }

    .mini-row:last-child {
      border-bottom: none;
    }

    .mini-row:hover {
      background: rgba(255, 215, 0, 0.05);
    }

    .mini-abbr {
      font-size: 0.7rem;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 0.3px;
    }

    .mini-abbr.pending {
      color: #888;
    }

    .mini-flag {
      width: 28px;
      height: 21px;
      border-radius: 2px;
      object-fit: cover;
      background: #333;
    }

    .mini-flag-ph {
      width: 28px;
      height: 21px;
      background: #444;
      border-radius: 2px;
    }

    .mini-score-wrap {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
    }

    .mini-score {
      font-size: 0.9rem;
      font-weight: bold;
      color: #4caf50;
    }

    .mini-score.live {
      color: #4caf50;
      font-size: 1rem;
    }

    .mini-score:not(.live) {
      color: #888;
    }

    .penalty-text {
      font-size: 0.55rem;
      color: #ff9800;
    }

    .mini-penalty {
      font-size: 0.6rem;
      font-weight: normal;
      color: #ff9800;
    }

    .mini-card-footer {
      background: #0f1729;
      padding: 4px 3px;
      border-top: 3px solid #ff4444;
      font-size: 0.55rem;
      color: #888;
      text-align: center;
      line-height: 1.2;
    }

    .mini-card.final {
      border: 3px solid #ffd700;
      width: 120px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }

    .trophy {
      font-size: 3rem;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .final-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: #ffd700;
      text-transform: uppercase;
    }

    .center-final {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .final-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .final-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .third-place {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 22px;
    }

    .third-title {
      font-size: 0.7rem;
      color: #aaa;
      font-weight: bold;
    }

    .error-msg {
      background: #c82333;
      border: 2px solid #f44336;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #fff;
      margin: 20px;
    }

    @media (max-width: 1024px) {
      .bracket-container {
        padding: 16px;
      }

      .tree li {
        padding: 20px 4px 0 4px;
      }

      .tree li::before,
      .tree li::after,
      .tree li ul::before {
        height: 20px;
      }

      .mini-card {
        width: 78px;
      }

      .mini-card.final {
        width: 88px;
      }

      .mini-card-header,
      .mini-card-footer {
        font-size: 0.5rem;
        padding: 2px;
      }

      .mini-row {
        min-height: 38px;
        padding: 4px 3px;
        gap: 1px;
      }

      .mini-abbr {
        font-size: 0.6rem;
      }

      .mini-flag,
      .mini-flag-ph {
        width: 22px;
        height: 16px;
      }

      .mini-score {
        font-size: 0.75rem;
      }

      .mini-score.live {
        font-size: 0.8rem;
      }

      .mini-penalty {
        font-size: 0.55rem;
      }

      .connector-v {
        height: 18px;
      }

      .trophy {
        font-size: 2rem;
      }

      .final-row {
        gap: 16px;
      }

      body {
        padding: 10px;
      }

      .header h1 {
        font-size: 1.4rem;
      }

      .header .subtitle {
        font-size: 0.7rem;
      }

      .status-bar {
        font-size: 0.7rem;
        margin-bottom: 8px;
      }
    }
    /* ===== CARTEL DE INSTALACIÓN (PWA) ===== */
    .install-banner {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 999;
      background: linear-gradient(135deg, #1a2555 0%, #2d3e5f 100%);
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(120%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .install-banner .install-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .install-banner .install-text {
      flex: 1;
      font-size: 0.8rem;
      line-height: 1.3;
      color: #fff;
    }

    .install-banner .install-text b {
      color: #ffd700;
    }

    .install-banner .install-btn {
      flex-shrink: 0;
      background: #ffd700;
      color: #0a0e27;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .install-banner .install-close {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #888;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }

    @media (max-width: 480px) {
      .install-banner {
        flex-wrap: wrap;
      }
      .install-banner .install-text {
        font-size: 0.75rem;
      }
    }
    .mini-card.selected {
      border-color: #ffd700;
      box-shadow: 0 0 18px rgba(255, 215, 0, 0.7);
      transform: scale(1.08);
      z-index: 5;
      position: relative;
    }

    /* ===== MODAL DE DETALLE DEL PARTIDO ===== */
    .match-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(2px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .match-modal {
      background: linear-gradient(135deg, #1a2555 0%, #2d3e5f 100%);
      border: 2px solid #ffd700;
      border-radius: 14px;
      max-width: 360px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 18px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      animation: modalPop 0.2s ease;
    }

    @keyframes modalPop {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .match-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .match-modal-round {
      font-size: 0.75rem;
      color: #ffd700;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .match-modal-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
    }

    .match-modal-team {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px;
    }

    .match-modal-team img {
      width: 40px;
      height: 30px;
      object-fit: cover;
      border-radius: 3px;
    }

    .match-modal-team-name {
      flex: 1;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
    }

    .match-modal-team-score {
      font-size: 1.4rem;
      font-weight: bold;
      color: #4caf50;
    }

    .match-modal-team-score .pen {
      font-size: 0.85rem;
      color: #ff9800;
      margin-left: 4px;
    }

    .match-modal-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 6px 0;
    }

    .match-modal-scorers {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #ccc;
    }

    .match-modal-scorers b {
      color: #aaa;
      font-size: 0.7rem;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .match-modal-scorers .scorer-line {
      padding: 2px 0;
    }

    .match-modal-stadium {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #ccc;
    }

    .match-modal-stadium-icon {
      font-size: 1.3rem;
      line-height: 1;
    }

    .match-modal-stadium-name {
      font-weight: bold;
      color: #fff;
      font-size: 0.85rem;
    }

    .match-modal-stadium-city {
      color: #aaa;
      font-size: 0.75rem;
    }

    .match-modal-stadium-capacity {
      margin-left: auto;
      font-size: 0.7rem;
      color: #888;
      text-align: right;
      white-space: nowrap;
    }

    .match-modal-footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      font-size: 0.75rem;
      color: #999;
      text-align: center;
    }

    .match-modal-footer .status-live {
      color: #ff4444;
      font-weight: bold;
    }
  </style>
</head>
